<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login – Question Hub</title>
  <link rel="icon" type="image/png" href="{{ url_for('static', filename='logo.png') }}">
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root {
      --apple-blue: #007aff;
      --apple-indigo: #5856d6;
      --apple-purple: #af52de;
      --text-bright: #f8fafc;
      --text-mid: #94a3b8;
      --text-dim: #64748b;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }

    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      background-color: #030712;
      color: var(--text-mid);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      overflow: hidden;
      position: relative;
    }

    /* ── Floating Aurora background ── */
    .bg-scene {
      position: fixed; inset: 0; z-index: 0;
      overflow: hidden; pointer-events: none;
    }
    .aurora {
      position: absolute; border-radius: 50%;
      filter: blur(100px); mix-blend-mode: screen;
      opacity: 0.28;
      animation: aurora-drift 24s ease-in-out infinite alternate;
    }
    .aurora-1 {
      width: 600px; height: 500px; top: -10%; left: -10%;
      background: radial-gradient(circle, var(--apple-blue) 0%, transparent 80%);
      animation-duration: 20s;
    }
    .aurora-2 {
      width: 500px; height: 400px; bottom: -5%; right: -5%;
      background: radial-gradient(circle, var(--apple-purple) 0%, transparent 80%);
      animation-duration: 25s; animation-delay: -5s;
    }
    .aurora-3 {
      width: 500px; height: 500px; top: 30%; left: 35%;
      background: radial-gradient(circle, #00f2fe 0%, transparent 80%);
      animation-duration: 28s; animation-delay: -10s;
    }
    @keyframes aurora-drift {
      0%   { transform: translate(0, 0) scale(1); }
      50%  { transform: translate(60px, 40px) scale(1.1); }
      100% { transform: translate(-40px, 20px) scale(0.95); }
    }
    .noise {
      position: absolute; inset: 0; opacity: 0.015;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 180px;
    }

    /* ── Card ── */
    .card {
      position: relative; z-index: 10;
      width: 100%; max-width: 400px;
      background: rgba(255, 255, 255, 0.025);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-top: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 24px;
      padding: 2.8rem 2.2rem 2.2rem;
      backdrop-filter: blur(28px);
      -webkit-backdrop-filter: blur(28px);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
      animation: card-in 0.5s cubic-bezier(0.16, 1, 0.3, 1) both;
    }
    @keyframes card-in {
      from { opacity: 0; transform: translateY(15px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ── Logo block ── */
    .logo-wrap { text-align: center; margin-bottom: 2rem; }
    .logo-icon {
      display: inline-flex; align-items: center; justify-content: center;
      width: 60px; height: 60px;
      background: linear-gradient(135deg, var(--apple-blue), var(--apple-indigo));
      border-radius: 50%; margin-bottom: 0.9rem;
      box-shadow: 0 8px 24px rgba(0, 122, 255, 0.3);
    }
    .logo-icon svg { width: 30px; height: 30px; color: #fff; }

    .logo-name {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 1.2rem; font-weight: 800;
      color: var(--text-bright);
      letter-spacing: -0.01em;
    }
    .logo-tag {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 0.75rem; font-weight: 600;
      color: var(--apple-blue);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-top: 2px;
    }

    /* ── Section label ── */
    .section-lbl {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 0.78rem; font-weight: 600;
      color: var(--text-dim);
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 1.4rem;
      text-align: center;
    }

    /* ── Field label ── */
    .f-label {
      display: block;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 0.75rem; font-weight: 600;
      color: var(--text-mid);
      margin-bottom: 0.45rem;
    }

    /* ── Inputs ── */
    .n-input {
      width: 100%;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      padding: 0.7rem 1rem;
      font-family: 'Inter', sans-serif;
      font-size: 0.92rem; font-weight: 500;
      color: #fff;
      outline: none;
      transition: border-color .2s, box-shadow .2s, background .2s;
    }
    .n-input::placeholder { color: var(--text-dim); }
    .n-input:hover { border-color: rgba(255, 255, 255, 0.15); }
    .n-input:focus {
      border-color: var(--apple-blue);
      background: rgba(0, 0, 0, 0.2);
      box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.2);
    }

    /* ── Password wrap ── */
    .pw-wrap { position: relative; }
    .pw-wrap .n-input { padding-right: 2.85rem; }
    .eye-btn {
      position: absolute; right: 0; top: 0; bottom: 0;
      display: flex; align-items: center; padding: 0 0.85rem;
      background: none; border: none; cursor: pointer;
      color: var(--text-dim);
      transition: color .15s;
    }
    .eye-btn:hover { color: var(--apple-blue); }
    .eye-btn svg { width: 18px; height: 18px; }

    /* ── Error alert ── */
    .err-box {
      display: flex; align-items: flex-start; gap: 0.6rem;
      background: rgba(255, 59, 48, 0.08);
      border: 1px solid rgba(255, 59, 48, 0.2);
      border-radius: 10px; padding: 0.75rem 0.9rem;
      margin-bottom: 1.4rem;
      font-size: 0.82rem; color: #ff453a;
    }
    .err-box svg { width: 16px; height: 16px; flex-shrink: 0; margin-top: 1px; }

    /* ── Submit ── */
    .neon-btn {
      width: 100%;
      background: linear-gradient(135deg, var(--apple-blue), var(--apple-indigo));
      border: none; border-radius: 12px;
      padding: 0.8rem 1rem;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 0.88rem; font-weight: 700;
      color: #fff;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(0, 122, 255, 0.25);
      transition: all 0.2s;
    }
    .neon-btn:hover {
      filter: brightness(1.1);
      transform: translateY(-1px);
    }
    .neon-btn:active { transform: translateY(0); }

    /* ── Field spacing ── */
    .field { margin-bottom: 1.25rem; }
    .field:last-of-type { margin-bottom: 1.6rem; }

    /* ── Footer ── */
    .card-foot {
      margin-top: 1.8rem; text-align: center;
      font-size: 0.72rem; font-weight: 500;
      color: var(--text-dim);
    }

    /* ── Back to Home link ── */
    .back-home {
      display: inline-flex; align-items: center; gap: 0.3rem;
      margin-bottom: 1.2rem;
      background: transparent;
      border: none;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 0.85rem; font-weight: 600;
      color: var(--apple-blue);
      text-decoration: none;
      transition: opacity .15s;
    }
    .back-home:hover {
      opacity: 0.8;
    }

    @media (max-width: 640px) {
      body {
        background-color: #030712 !important;
      }
      .bg-scene {
        display: none !important;
      }
      .card {
        animation: none !important;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5) !important;
        backdrop-filter: none !important;
        -webkit-backdrop-filter: none !important;
        background: #0f172a !important;
      }
    }
  </style>
</head>

<body>
  <!-- Aurora blobs -->
  <div class="bg-scene">
    <div class="aurora aurora-1"></div>
    <div class="aurora aurora-2"></div>
    <div class="aurora aurora-3"></div>
    <div class="noise"></div>
  </div>

  <!-- ════════════ LOGIN CARD ════════════ -->
  <div class="card">

    <!-- Back to Home -->
    <a href="/" class="back-home">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block; vertical-align:-3px; margin-right:3px;">
        <polyline points="15 18 9 12 15 6"></polyline>
      </svg>Back
    </a>

    <!-- Logo -->
    <div class="logo-wrap">
      <div class="logo-icon">
        <svg class="text-white" fill="currentColor" viewBox="0 0 20 20" style="width:28px;height:28px;">
          <path d="M11.3 1.046A1 1 0 0112 2v7h4a1 1 0 01.82 1.573l-7 10A1 1 0 018 20v-7H4a1 1 0 01-.82-1.573l7-10a1 1 0 011.12-.38z" />
        </svg>
      </div>
      <div class="logo-name">Question Hub</div>
      <div class="logo-tag">Admin Portal</div>
    </div>

    <div class="section-lbl">Sign in to continue</div>

    <!-- Error -->
    {% if error %}
    <div class="err-box" role="alert">
      <svg fill="currentColor" viewBox="0 0 20 20" style="margin-top:2px;">
        <path fill-rule="evenodd"
              d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1
                 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z"
              clip-rule="evenodd"/>
      </svg>
      <span>{{ error }}</span>
    </div>
    {% endif %}

    <!-- Form -->
    <form method="POST" novalidate>
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
      <div class="field">
        <label for="username" class="f-label">Username</label>
        <input type="text" id="username" name="username" class="n-input"
               required autocomplete="username" placeholder="Enter username"/>
      </div>
      <div class="field">
        <label for="password" class="f-label">Password</label>
        <div class="pw-wrap">
          <input type="password" id="password" name="password" class="n-input"
                 required autocomplete="current-password" placeholder="••••••••"/>
          <button type="button" class="eye-btn" onclick="togglePw()" aria-label="Toggle password visibility">
            <svg id="i-on" fill="none" stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
              <path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
              <path d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7
                       -1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
            </svg>
            <svg id="i-off" class="hidden" fill="none" stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24">
              <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8
                       a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8
                       a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
          </button>
        </div>
      </div>
      <button type="submit" class="neon-btn">Sign In</button>
    </form>

    <p class="card-foot">&copy; {{ year }} Question Hub &nbsp;·&nbsp; All rights reserved</p>
  </div>
  <!-- /LOGIN CARD -->

  <script>
    function togglePw() {
      const inp = document.getElementById('password');
      const on  = document.getElementById('i-on');
      const off = document.getElementById('i-off');
      const show = inp.type === 'password';
      inp.type = show ? 'text' : 'password';
      on .classList.toggle('hidden',  show);
      off.classList.toggle('hidden', !show);
    }
  </script>
</body>
</html>
